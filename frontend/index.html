<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練琴獎勵系統</title>
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="apple-touch-icon" href="/icon.png">
    <style>
        /* ── Eevee Watercolor Light Theme ── */
        :root {
            /* Backgrounds - soft warm neutral */
            --bg-base:      #EEEDF5;
            --bg-surface:   #F7F6FB;
            --bg-elevated:  #ECEAF3;
            --bg-elevated2: #E2DFED;
            --bg-card:      #F7F6FB;

            /* Accent - Eevee warm amber */
            --accent:       #D4831E;
            --accent-light: #E89A30;
            --accent-hover: #C07018;
            --accent-dim:   rgba(212,131,30,0.10);
            --accent-glow:  rgba(212,131,30,0.20);

            /* Teal - Vaporeon */
            --teal:         #2AAABF;
            --teal-light:   #4EC4D8;
            --teal-dim:     rgba(42,170,191,0.10);

            /* Pink - Sylveon */
            --pink:         #D4609A;
            --pink-dim:     rgba(212,96,154,0.10);

            /* Purple - Espeon/night sky */
            --purple:       #6A50C8;
            --purple-dim:   rgba(106,80,200,0.10);

            /* Text - deep indigo from the night sky */
            --text-primary:   #1C2260;
            --text-secondary: #4A5490;
            --text-subdued:   #8890C0;

            /* Borders */
            --border:       #DDD8F5;
            --border-strong:#C8C0EC;

            /* Status */
            --danger:       #D94040;
            --danger-dim:   rgba(217,64,64,0.09);
            --warning:      #D47820;
            --warning-dim:  rgba(212,120,32,0.10);
            --success:      var(--teal);
            --success-dim:  var(--teal-dim);

            /* Radius */
            --radius-sm:    6px;
            --radius-md:    12px;
            --radius-lg:    18px;
            --radius-xl:    24px;
            --radius-pill:  500px;

            /* Shadows */
            --shadow-sm:    0 2px 8px rgba(106,80,200,0.08);
            --shadow-md:    0 6px 20px rgba(106,80,200,0.12);
            --shadow-lg:    0 16px 48px rgba(106,80,200,0.16);
            --shadow-accent: 0 4px 16px rgba(212,131,30,0.25);
            --shadow-teal:   0 4px 14px rgba(42,170,191,0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background:
                radial-gradient(ellipse at 0% 0%, rgba(106,80,200,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 100%, rgba(42,170,191,0.04) 0%, transparent 50%),
                var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* ── Container ── */
        .container {
            width: 100%;
            max-width: 900px;
            background: var(--bg-surface);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg), 0 0 0 1px var(--border);
        }

        .content { display: grid; grid-template-columns: 1fr 1fr; min-height: 580px; }

        /* ── Welcome panel ── */
        .welcome-section {
            background:
                radial-gradient(ellipse at 30% 20%, rgba(212,131,30,0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 85%, rgba(42,170,191,0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 10% 90%, rgba(212,96,154,0.08) 0%, transparent 45%),
                linear-gradient(160deg, #EDE8FF 0%, #F5F2FF 40%, #E8F4FF 100%);
            color: var(--text-primary);
            padding: 52px 36px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-right: 1px solid var(--border);
        }

        /* Decorative music notes */
        .welcome-section::before {
            content: '♩ ♪ ♫ ♬ ♩';
            position: absolute;
            top: 18px; left: 0; right: 0;
            text-align: center;
            font-size: 13px;
            color: rgba(212,131,30,0.25);
            letter-spacing: 10px;
            pointer-events: none;
        }

        .welcome-section::after {
            content: '♬ ♫ ♪ ♩ ♬';
            position: absolute;
            bottom: 18px; left: 0; right: 0;
            text-align: center;
            font-size: 13px;
            color: rgba(42,170,191,0.22);
            letter-spacing: 10px;
            pointer-events: none;
        }

        .app-icon {
            width: 138px;
            height: 138px;
            object-fit: contain;
            margin-bottom: 22px;
            position: relative; z-index: 1;
            border-radius: 24px;
            box-shadow:
                0 8px 32px rgba(212,131,30,0.22),
                0 2px 8px rgba(106,80,200,0.12),
                0 0 0 3px rgba(255,255,255,0.9);
        }

        .welcome-section h1 {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: 10px;
            position: relative; z-index: 1;
            letter-spacing: -0.5px;
        }

        .welcome-section h1 span { color: var(--accent); }

        .welcome-section p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.8;
            position: relative; z-index: 1;
        }

        /* ── Login panel ── */
        .login-section {
            background: var(--bg-surface);
            padding: 52px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-section h2 {
            font-size: 24px;
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: 26px;
            text-align: center;
        }

        /* ── User-type toggle ── */
        .user-type {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            background: var(--bg-elevated);
            border-radius: var(--radius-pill);
            padding: 4px;
            border: 1px solid var(--border);
        }

        .user-type-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.22s ease;
            color: var(--text-secondary);
        }

        .user-type-btn:hover { color: var(--accent); }

        .user-type-btn.active {
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
            color: #fff;
            box-shadow: var(--shadow-accent);
        }

        /* ── Form elements ── */
        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.9px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-elevated);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 15px;
            color: var(--text-primary);
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder { color: var(--text-subdued); }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .form-group textarea { resize: vertical; min-height: 80px; }

        /* ── Remember me ── */
        .remember-row { margin-top: -2px; margin-bottom: 8px; }

        .remember-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .remember-label input[type="checkbox"] {
            width: 15px; height: 15px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* ── Buttons ── */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
            color: #fff;
            border: none;
            border-radius: var(--radius-pill);
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            box-shadow: var(--shadow-accent);
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #F0AA40 0%, #C87018 100%);
            box-shadow: 0 6px 22px rgba(212,131,30,0.38);
            transform: translateY(-1px);
        }

        .login-btn:active { transform: translateY(0); box-shadow: var(--shadow-accent); }

        .submit-btn {
            padding: 11px 28px;
            background: linear-gradient(135deg, var(--teal-light) 0%, var(--teal) 100%);
            color: #fff;
            border: none;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-weight: 900;
            font-size: 14px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-teal);
        }

        .submit-btn:hover {
            box-shadow: 0 6px 20px rgba(42,170,191,0.38);
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; filter: none; }

        .action-btn {
            padding: 10px 16px;
            border: 1.5px solid var(--border-strong);
            background: var(--bg-surface);
            color: var(--text-secondary);
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .action-btn:hover {
            border-color: var(--teal);
            color: var(--teal);
            background: var(--teal-dim);
            box-shadow: var(--shadow-teal);
        }

        .action-btn.logout {
            grid-column: span 2;
            background: var(--bg-surface);
            border-color: #E8B0B0;
            color: var(--danger);
        }

        .action-btn.logout:hover {
            background: var(--danger-dim);
            border-color: var(--danger);
            box-shadow: 0 4px 14px rgba(217,64,64,0.18);
        }

        /* ── Messages ── */
        .error-message {
            background: var(--danger-dim);
            color: var(--danger);
            border: 1px solid rgba(217,64,64,0.25);
            padding: 11px 14px;
            border-radius: var(--radius-md);
            margin-bottom: 14px;
            display: none;
            font-size: 14px;
            font-weight: 600;
        }

        .success-message {
            background: var(--teal-dim);
            color: var(--teal);
            border: 1px solid rgba(42,170,191,0.25);
            padding: 11px 14px;
            border-radius: var(--radius-md);
            margin-bottom: 14px;
            display: none;
            font-size: 14px;
            font-weight: 600;
        }

        /* ── Loading ── */
        .loading { display: none; text-align: center; color: var(--accent); font-weight: 700; font-size: 13px; }

        .spinner {
            border: 3px solid var(--bg-elevated2);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 22px; height: 22px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ── Visibility toggles ── */
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        .login-form { display: block; }
        .login-form.hidden { display: none; }

        /* ── Dashboard header ── */
        .dashboard-header {
            background: linear-gradient(135deg, #EDE8FF 0%, #E8F4FF 100%);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 22px 26px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .dashboard-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at top left, rgba(212,131,30,0.08) 0%, transparent 65%);
            pointer-events: none;
        }

        .dashboard-header h2 { font-size: 22px; font-weight: 900; margin-bottom: 4px; color: var(--text-primary); }
        .dashboard-header p  { color: var(--text-secondary); font-size: 13px; }

        /* ── User info ── */
        .user-info {
            background: var(--bg-elevated);
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            margin-bottom: 18px;
            font-size: 14px;
            border: 1px solid var(--border);
        }

        .info-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .info-item:last-child { border-bottom: none; }
        .info-label { font-weight: 700; color: var(--text-subdued); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; }
        .info-value { color: var(--text-primary); word-break: break-all; max-width: 60%; text-align: right; font-size: 13px; font-weight: 600; }

        /* ── Action buttons area ── */
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }

        /* ── Navigation tabs ── */
        .nav-tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 18px;
            border-bottom: 2px solid var(--border);
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 11px 16px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-subdued);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s ease;
        }

        .nav-tab:hover { color: var(--accent); }

        .nav-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ── Form sections ── */
        .form-section {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 20px 22px;
            border-radius: var(--radius-lg);
            margin-bottom: 14px;
            box-shadow: var(--shadow-sm);
        }

        .form-section h3 {
            color: var(--purple);
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .form-row.full { grid-template-columns: 1fr; }

        /* ── Record items ── */
        .record-item {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-bottom: 10px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .record-item:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 14px var(--accent-glow);
            transform: translateY(-1px);
        }

        .record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .record-date { font-weight: 800; color: var(--text-primary); font-size: 14px; }

        .record-status {
            padding: 3px 11px;
            border-radius: var(--radius-pill);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .record-status.pending  { background: var(--warning-dim); color: var(--warning); border: 1px solid rgba(212,120,32,0.25); }
        .record-status.approved { background: var(--teal-dim);    color: var(--teal);    border: 1px solid rgba(42,170,191,0.25); }
        .record-status.rejected { background: var(--danger-dim);  color: var(--danger);  border: 1px solid rgba(217,64,64,0.25); }

        .record-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }

        /* ── Child cards ── */
        .child-card {
            background: var(--bg-surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.22s ease;
            box-shadow: var(--shadow-sm);
        }

        .child-card:hover {
            border-color: var(--accent);
            box-shadow: 0 6px 22px var(--accent-glow);
            transform: translateY(-2px);
        }

        .child-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .child-name { font-size: 17px; font-weight: 900; color: var(--text-primary); }
        .child-age  { font-size: 12px; color: var(--text-subdued); font-weight: 600;
                      background: var(--bg-elevated); padding: 2px 10px; border-radius: var(--radius-pill); }

        .child-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 4px; }

        .child-stat-item {
            text-align: center;
            padding: 10px 6px;
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        .child-stat-value { font-size: 15px; font-weight: 900; color: var(--accent); }
        .child-stat-label { font-size: 10px; color: var(--text-subdued); margin-top: 3px; font-weight: 600; }

        /* ── Record action buttons ── */
        .record-action-buttons { display: flex; gap: 8px; margin-top: 10px; }

        .record-action-btn {
            flex: 1;
            padding: 8px 10px;
            border: none;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: 12px;
            font-weight: 800;
            transition: all 0.2s ease;
        }

        .record-action-btn.approve { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(42,170,191,0.3); }
        .record-action-btn.approve:hover { background: var(--teal); color: #fff; box-shadow: var(--shadow-teal); }
        .record-action-btn.reject  { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(217,64,64,0.3); }
        .record-action-btn.reject:hover  { background: var(--danger); color: white; }

        /* ── Stat box ── */
        .stat-box {
            background: linear-gradient(135deg, #EDE8FF 0%, #E8F4FF 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 36px 20px;
            text-align: center;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .stat-box::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(212,131,30,0.10) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(42,170,191,0.08) 0%, transparent 55%);
            pointer-events: none;
        }

        .stat-value {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent) 20%, var(--teal) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: -4px;
            line-height: 1;
            position: relative; z-index: 1;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative; z-index: 1;
        }

        /* ── Manage child cards ── */
        .manage-child-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-bottom: 10px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .manage-child-card:hover { border-color: var(--accent-light); box-shadow: 0 4px 14px var(--accent-glow); }

        .manage-child-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .manage-child-info { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; font-weight: 500; }
        .manage-child-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .manage-btn {
            padding: 6px 14px;
            border: none;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .manage-btn.rename   { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(42,170,191,0.3); }
        .manage-btn.rename:hover   { background: var(--teal); color: #fff; box-shadow: var(--shadow-teal); }
        .manage-btn.password { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(212,131,30,0.3); }
        .manage-btn.password:hover { background: var(--accent); color: #fff; box-shadow: var(--shadow-accent); }
        .manage-btn.delete   { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(217,64,64,0.3); }
        .manage-btn.delete:hover   { background: var(--danger); color: white; }

        /* ── Reward points badge in header ── */
        .reward-points-badge {
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            background: linear-gradient(135deg, var(--accent-dim), var(--teal-dim));
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            padding: 8px 22px;
            position: relative; z-index: 1;
        }

        .reward-points-value {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent) 30%, var(--teal) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            line-height: 1;
        }

        .reward-points-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* ── Ratio info box ── */
        .ratio-info-box {
            padding: 12px 16px;
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        /* ── Reward cost badge ── */
        .reward-cost-badge {
            font-size: 15px;
            font-weight: 900;
            color: var(--danger);
            background: var(--danger-dim);
            border: 1px solid rgba(217,64,64,0.2);
            padding: 4px 14px;
            border-radius: var(--radius-pill);
        }

        /* ── Approved records ── */
        .approved-child-group {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 14px;
            box-shadow: var(--shadow-sm);
        }

        .approved-child-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--accent-dim), var(--teal-dim));
            border-bottom: 1px solid var(--border);
        }

        .approved-child-name {
            font-size: 15px;
            font-weight: 900;
            color: var(--text-primary);
        }

        .approved-child-total {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            background: var(--bg-surface);
            padding: 3px 12px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--accent-dim);
        }

        .approved-record-table { padding: 0 8px 8px; }

        .approved-record-row {
            display: grid;
            grid-template-columns: 110px 100px 1fr 110px;
            gap: 8px;
            padding: 9px 8px;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .approved-record-row:last-child { border-bottom: none; }

        .approved-record-row.header {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-subdued);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding-top: 10px;
        }

        .ar-date   { color: var(--text-primary); font-weight: 700; }
        .ar-minutes { color: var(--teal); font-weight: 800; }
        .ar-note   { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ar-time   { color: var(--text-subdued); text-align: right; }

        @media (max-width: 768px) {
            .approved-record-row {
                grid-template-columns: 90px 80px 1fr;
                grid-template-rows: auto auto;
            }
            .ar-time { display: none; }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-elevated); }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-subdued); }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            body { padding: 0; align-items: flex-start; }

            .container { border-radius: 0; min-height: 100vh; box-shadow: none; }
            .content { grid-template-columns: 1fr; min-height: auto; }

            .welcome-section {
                padding: 14px 18px;
                flex-direction: row;
                justify-content: flex-start;
                text-align: left;
                gap: 14px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .welcome-section::before,
            .welcome-section::after { display: none; }

            .app-icon { width: 46px; height: 46px; margin-bottom: 0; border-radius: 10px; }
            .welcome-section h1 { font-size: 18px; margin-bottom: 3px; }
            .welcome-section p  { font-size: 12px; }

            .login-section { padding: 22px 16px; }
            .login-section h2 { font-size: 21px; margin-bottom: 20px; }

            .dashboard-header { padding: 14px; margin-bottom: 14px; }
            .dashboard-header h2 { font-size: 17px; }

            .user-info { padding: 10px 14px; margin-bottom: 14px; }

            .action-buttons { grid-template-columns: 1fr; gap: 8px; margin-bottom: 14px; }
            .action-btn.logout { grid-column: span 1; }

            .nav-tabs { gap: 0; }
            .nav-tab { padding: 10px 6px; font-size: 11px; flex: 1; text-align: center; }

            .form-section { padding: 14px; }
            .form-row { grid-template-columns: 1fr; gap: 0; }

            .submit-btn { width: 100%; padding: 13px; font-size: 15px; }

            .child-stats { grid-template-columns: 1fr 1fr; }
            .record-details { grid-template-columns: 1fr; gap: 4px; }
            .record-action-buttons { flex-direction: column; }

            .manage-child-actions { gap: 6px; }
            .manage-btn { flex: 1; text-align: center; padding: 7px 4px; font-size: 11px; }

            .stat-value { font-size: 52px; }
        }
    </style>
</head>
<body>
    <div class="container">

                                    <input type="text" id="newChildId" placeholder="英文或數字，例如：kid01、101" autocapitalize="none" autocorrect="off" autocomplete="off">
                                </div>
                                <div class="form-group">

                            <div class="form-row">

                                    <label for="newChildName">姓名</label>

                                <div class="form-group">

                            <div id="addChildResult" style="margin-top: 15px;"></div>

                        <div class="form-section">

                    <!-- 帳號設定 -->

                                <div class="form-group">

                            <div class="form-row full">

                            <button class="submit-btn" onclick="changeParentPassword()">更新密碼</button>
                            <div id="changePasswordResult" style="margin-top: 15px;"></div>

                    </div>

                    </div>
                </div>

                <!-- 孩子端導航標籤 -->
                <div id="childNav" style="display: none;">
                    <div class="nav-tabs">
                        <button class="nav-tab active" onclick="switchTab('log-practice')">📝 登錄練琴</button>
                        <button class="nav-tab" onclick="switchTab('practice-history')">📋 練琴紀錄</button>
                        <button class="nav-tab" onclick="switchTab('request-game')">🎮 申請遊戲時間</button>

    <script>
        const API_BASE_URL = `${window.location.origin}/api`;
        let currentUserType = 'parent';
        let currentToken = null;
        let currentUserId = null;

        // 選擇用戶類型
        function selectUserType(type) {
            currentUserType = type;
            
            // 更新按鈕樣式
            document.querySelectorAll('.user-type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-type="${type}"]`).classList.add('active');

            // 切換表單
            if (type === 'parent') {
                document.getElementById('parentForm').style.display = 'block';
                document.getElementById('childForm').style.display = 'none';
            } else {
                document.getElementById('parentForm').style.display = 'none';
                document.getElementById('childForm').style.display = 'block';
            }

            // 清除錯誤消息
            clearMessages();
        }

        // 顯示錯誤消息
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            clearMessages();
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // 顯示成功消息
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        // 清除消息
        function clearMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        // 登入處理
        // 頁面載入時從 localStorage 恢復已記住的帳號
        function loadRememberedCredentials() {
            const parentSaved = JSON.parse(localStorage.getItem('parent_remember') || 'null');
            if (parentSaved) {
                document.getElementById('parentUsername').value = parentSaved.username || '';
                document.getElementById('parentPassword').value = parentSaved.password || '';
                document.getElementById('parentRemember').checked = true;
            }
            const childSaved = JSON.parse(localStorage.getItem('child_remember') || 'null');
            if (childSaved) {
                document.getElementById('childId').value = childSaved.childId || '';
                document.getElementById('childPassword').value = childSaved.password || '';
                document.getElementById('childRemember').checked = true;
            }
        }
        loadRememberedCredentials();

        async function handleLogin() {
            try {
                const loginBtn = document.getElementById('loginBtn');
                const loading = document.getElementById('loading');

                loginBtn.disabled = true;
                loading.style.display = 'block';
                clearMessages();

                let payload;
                let endpoint;

                if (currentUserType === 'parent') {
                    const username = document.getElementById('parentUsername').value;
                    const password = document.getElementById('parentPassword').value;

                    if (!username || !password) {
                        throw new Error('請輸入用戶名和密碼');
                    }

                    // 記住帳號
                    if (document.getElementById('parentRemember').checked) {
                        localStorage.setItem('parent_remember', JSON.stringify({ username, password }));
                    } else {
                        localStorage.removeItem('parent_remember');
                    }

                    payload = { username, password };
                    endpoint = `${API_BASE_URL}/auth/parent/login`;
                } else {
                    const childId = document.getElementById('childId').value;
                    const password = document.getElementById('childPassword').value;

                    if (!childId || !password) {
                        throw new Error('請輸入孩子ID和密碼');
                    }

                    // 記住帳號
                    if (document.getElementById('childRemember').checked) {
                        localStorage.setItem('child_remember', JSON.stringify({ childId, password }));
                    } else {
                        localStorage.removeItem('child_remember');
                    }

                    payload = { child_id: childId, password };
                    endpoint = `${API_BASE_URL}/auth/child/login`;
                }

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || '登入失敗');
                }

                const data = await response.json();
                
                // 保存 Token 和用戶信息
                currentToken = data.access_token;
                
                if (currentUserType === 'parent') {
                    currentUserId = data.parent_id;
                    displayDashboard(
                        '👨‍👩‍👧 家長',
                        data.parent_id,
                        data.username,
                        data.access_token
                    );
                } else {
                    currentUserId = data.child_id;
                    displayDashboard(
                        '👧 孩子',
                        data.child_id,
                        data.name,
                        data.access_token
                    );
                }

                showSuccess('登入成功！');

            } catch (error) {
                showError('登入失敗: ' + error.message);
            } finally {
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        // 顯示儀表板
        function displayDashboard(userType, userId, userName, token) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('dashboard').classList.add('active');

            document.getElementById('dashboardTitle').textContent = `歡迎，${userName}！`;
            document.getElementById('dashboardSubtitle').textContent = userType;
            document.getElementById('userType').textContent = userType;
            document.getElementById('userId').textContent = userId;
            document.getElementById('userName').textContent = userName;

            // 如果是孩子，初始化孩子端功能
            if (userType.includes('孩子')) {
                document.getElementById('rewardPointsDisplay').style.display = 'block';
                document.getElementById('childNav').style.display = 'block';
                loadChildDashboard(userId);
            } else if (userType.includes('家長')) {
                document.getElementById('parentNav').style.display = 'block';
                loadParentDashboard(userId);
            }

            clearTestResults();
        }

        // 加載家長端儀表板
        async function loadParentDashboard(parentId) {
            try {
                // 第一步：獲取家長的所有孩子列表
                const response = await fetch(`${API_BASE_URL}/practice/parent/children`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('無法獲取孩子列表');
                }

                const data = await response.json();
                console.log('👨‍👩‍👧 家長孩子列表:', data);

                // 顯示孩子列表
                displayChildrenList(data.children);
                
                // 加載待批準的記錄
                loadPendingRecords();
                
                // 加載遊戲時間申請
                loadParentGameRequests();

            } catch (error) {
                showError('加載家長儀表板失敗: ' + error.message);
            }
        }

        // 顯示孩子列表
        function displayChildrenList(children) {
            const container = document.getElementById('childrenListContainer');
            
            if (children.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">暫無孩子信息</p>';
                return;
            }

            container.innerHTML = children.map(child => `
                <div class="child-card" onclick="selectChildForParent('${child.id}', '${child.name}')">
                    <div class="child-card-header">

        // 加載待批準的記錄
        async function loadPendingRecords() {
            try {
                const response = await fetch(`${API_BASE_URL}/practice/parent/children`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('無法獲取待批準的記錄');
                }

                const parentData = await response.json();
                let allPendingRecords = [];

                // 收集所有孩子的待批準記錄
                for (const child of parentData.children) {
                    const recordResponse = await fetch(`${API_BASE_URL}/practice/records/${child.id}?status=pending`, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${currentToken}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    if (recordResponse.ok) {
                        const recordData = await recordResponse.json();
                        recordData.records.forEach(record => {
                            record.child_name = child.name;
                        });
                        allPendingRecords = allPendingRecords.concat(recordData.records);
                    }
                }

                console.log('📊 所有待批準記錄:', allPendingRecords);
                displayPendingRecords(allPendingRecords);

            } catch (error) {
                showError('加載待批準記錄失敗: ' + error.message);
            }
        }

        // 載入已批准紀錄（過去30天，以兒童為單位）
        async function loadApprovedRecords() {
            const container = document.getElementById('approvedRecordsContainer');
            container.innerHTML = '<p style="text-align:center;color:var(--text-subdued);">載入中...</p>';
            try {
                const parentResp = await fetch(`${API_BASE_URL}/practice/parent/children`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                if (!parentResp.ok) throw new Error('無法取得兒童列表');
                const parentData = await parentResp.json();

                const thirtyDaysAgo = new Date();
                thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
                const startDate = thirtyDaysAgo.toISOString().split('T')[0];

                // 逐一取得每位兒童的已批准紀錄
                const childGroups = [];
                for (const child of parentData.children) {
                    const resp = await fetch(
                        `${API_BASE_URL}/practice/records/${child.id}?status=approved&start_date=${startDate}`,
                        { headers: { 'Authorization': `Bearer ${currentToken}` } }
                    );
                    if (!resp.ok) continue;
                    const data = await resp.json();
                    if (data.records.length > 0) {
                        childGroups.push({ child, records: data.records });
                    }
                }

                if (childGroups.length === 0) {
                    container.innerHTML = '<p style="text-align:center;color:var(--text-subdued);padding:20px;">過去 30 天內沒有已批准的練琴紀錄</p>';
                    return;
                }

                container.innerHTML = childGroups.map(({ child, records }) => {
                    const totalMinutes = records.reduce((sum, r) => sum + r.practice_minutes, 0);
                    const recordRows = records.map(r => `
                        <div class="approved-record-row">
                            <span class="ar-date">${r.date}</span>
                            <span class="ar-minutes">${r.practice_minutes} 分鐘</span>
                            <span class="ar-note">${r.notes || ''}</span>
                            <span class="ar-time">${r.approved_at ? new Date(r.approved_at).toLocaleDateString('zh-TW') : ''}</span>
                        </div>
                    `).join('');

                    return `
                        <div class="approved-child-group">
                            <div class="approved-child-header">
                                <span class="approved-child-name">👧 ${child.name}</span>
                                <span class="approved-child-total">共 ${totalMinutes} 分鐘 · ${records.length} 筆</span>
                            </div>
                            <div class="approved-record-table">
                                <div class="approved-record-row header">
                                    <span class="ar-date">日期</span>
                                    <span class="ar-minutes">練琴時間</span>
                                    <span class="ar-note">備註</span>
                                    <span class="ar-time">批准日期</span>
                                </div>
                                ${recordRows}
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                container.innerHTML = `<p style="color:var(--danger)">載入失敗：${error.message}</p>`;
            }
        }

                    <div class="record-header">

                    </div>

            try {

                    method: 'POST',

        // 加載家長的遊戲時間申請
        async function loadParentGameRequests() {

        // 修改遊戲申請額度
        async function modifyGameRequest(childId, requestId, action) {
            const minutes = prompt(`請輸入要${action === 'add' ? '增加' : '減少'}的獎勵點數:\n(必須是15的倍數)`);
            
            if (!minutes || isNaN(minutes)) return;
            
            const numMinutes = parseInt(minutes);
            if (numMinutes % 15 !== 0) {
                showError('獎勵點數必須是15的倍數');
                return;
            }

            try {
                // 這裡可以調用API來修改額度，目前先顯示提示
                showSuccess(`${action === 'add' ? '已增加' : '已減少'} ${numMinutes} 點的獎勵點數`);
                loadParentGameRequests();

            } catch (error) {
                showError('修改失敗: ' + error.message);
            }
        }

        // 顯示獎勵遊戲時間對話框
        function showRewardDialog(childId, childName) {
            const minutes = prompt(`請輸入要獎勵給 ${childName} 的練琴獎勵點數:\n(必須是15的倍數)\n\n例如: 15, 30, 45, 60`);
            
            if (!minutes || isNaN(minutes)) return;
            
            const numMinutes = parseInt(minutes);
            if (numMinutes <= 0) {
                showError('獎勵點數必須大於0');
                return;
            }
            if (numMinutes % 15 !== 0) {
                showError('獎勵點數必須是15的倍數');
                return;
            }

            const reason = prompt(`請輸入獎勵原因(可選):\n例如: 表現良好、完成額外任務等`);
            
            rewardGameTime(childId, childName, numMinutes, reason || '家長獎勵');
        }

        // 獎勵遊戲時間
        async function rewardGameTime(childId, childName, minutes, reason) {
            try {
                const response = await fetch(`${API_BASE_URL}/awards/give`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        child_id: childId,
                        game_minutes: minutes,
                        reason: reason
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || '獎勵失敗');
                }

                const data = await response.json();
                console.log('🎁 遊戲時間已獎勵:', data);
                showSuccess(`✓ 已獎勵 ${childName} ${minutes} 點練琴獎勵點數！\n原因: ${reason}\n新餘額: ${data.new_balance} 點`);
                
                // 重新加載家長儀表板
                loadParentDashboard(currentUserId);

            } catch (error) {
                showError('獎勵失敗: ' + error.message);
            }
        }

        // 修改家長密碼
        async function changeParentPassword() {
            const current = document.getElementById('currentPassword').value;
            const newPwd = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const resultDiv = document.getElementById('changePasswordResult');

            if (!current) { showError('請輸入目前密碼'); return; }
            if (!newPwd || newPwd.length < 4) { showError('新密碼至少需要 4 個字元'); return; }
            if (newPwd !== confirm) { showError('兩次輸入的新密碼不一致'); return; }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/parent/change-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ current_password: current, new_password: newPwd })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || '更新失敗');
                }

                resultDiv.innerHTML = '<div style="background:#efe;color:#3a3;padding:10px;border-radius:6px;">✅ 密碼已成功更新</div>';
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';

            } catch (error) {
                resultDiv.innerHTML = `<div style="background:#fee;color:#c33;padding:10px;border-radius:6px;">❌ ${error.message}</div>`;
            }
        }

        // 新增兒童帳號
        async function addChildAccount() {
            const name = document.getElementById('newChildName').value.trim();
            const password = document.getElementById('newChildPassword').value;
            const age = document.getElementById('newChildAge').value;
            const customId = document.getElementById('newChildId').value;
            const resultDiv = document.getElementById('addChildResult');

            if (!name) { showError('請輸入孩子姓名'); return; }
            if (!password || password.length < 4) { showError('密碼至少需要 4 個字元'); return; }
            if (customId && !/^[A-Za-z0-9]{1,20}$/.test(customId)) {
                showError('ID 只能包含英文字母與數字，長度 1~20'); return;
            }

            try {
                const body = { name, password };
                if (age) body.age = parseInt(age);
                if (customId) body.id = customId;

                const response = await fetch(`${API_BASE_URL}/management/create-child`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify(body)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || '新增失敗');
                }

                const data = await response.json();
                resultDiv.innerHTML = `<div style="background:#efe;color:#3a3;padding:10px;border-radius:6px;">
                    ✅ 帳號已建立！孩子 ID：<strong>${data.child_id}</strong>，名稱：<strong>${data.name}</strong><br>
                    <small>請記錄此 ID，孩子登入時需要使用</small>
                </div>`;

                // 清空表單
                document.getElementById('newChildId').value = '';
                document.getElementById('newChildName').value = '';
                document.getElementById('newChildPassword').value = '';
                document.getElementById('newChildAge').value = '';

                // 重新載入列表
                loadManageChildren();
                loadParentDashboard(currentUserId);

            } catch (error) {
                resultDiv.innerHTML = `<div style="background:#fee;color:#c33;padding:10px;border-radius:6px;">❌ ${error.message}</div>`;
            }
        }

            const today = new Date();
            document.getElementById('practiceDate').valueAsDate = today;
            
            // 設置預設時間為當前本地時間（四舍五入到最近的5分鐘倍數）
            const now = new Date();
            const minutes = Math.round(now.getMinutes() / 5) * 5;
            let hours = now.getHours();
            let roundedMinutes = minutes;
            
            // 處理舍入導致的小時變化
            if (roundedMinutes >= 60) {
                hours = (hours + 1) % 24;  // 處理午夜溢出
                roundedMinutes = 0;
            }
            
            const timeString = String(hours).padStart(2, '0') + ':' + String(roundedMinutes).padStart(2, '0');
            document.getElementById('practiceTime').value = timeString;
            
            // 🔍 調試：顯示時間初始化信息
            console.log('⏰ 時間初始化:', {
                系統時間: now.toString(),
                extractedHours: now.getHours(),
                extractedMinutes: now.getMinutes(),
                舍入後分鐘: roundedMinutes,
                最終小時: hours,
                時間輸入值: timeString,
                時區偏移: now.getTimezoneOffset(),
                本地時區: Intl.DateTimeFormat().resolvedOptions().timeZone
            });
            
            loadPracticeRecords(childId);
            loadGameBalance(childId);
        }

        // 切換標籤
        function switchTab(tabName) {
            // 隱藏所有標籤內容
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            // 移除所有標籤的active類
            document.querySelectorAll('.nav-tab').forEach(btn => {
                btn.classList.remove('active');
            });

            // 顯示選中的標籤
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // 根據標籤刷新數據
            if (tabName === 'practice-history') {
                loadPracticeRecords(currentUserId);
            } else if (tabName === 'request-game') {
                loadRatioInfo();
            } else if (tabName === 'reward-history') {
                loadRewardHistory(currentUserId);
            } else if (tabName === 'approved-records') {
                loadApprovedRecords();
            } else if (tabName === 'manage-children') {
                loadManageChildren();
            }
        }

        // 提交練琴記錄
        async function submitPracticeRecord() {
            try {
                if (!currentToken) throw new Error('未登入');

                const date = document.getElementById('practiceDate').value;
                let time = document.getElementById('practiceTime').value;
                const minutes = parseInt(document.getElementById('practiceMinutes').value);
                const notes = document.getElementById('practiceNotes').value;

                if (!date) throw new Error('請選擇日期');
                if (!minutes || minutes < 15) throw new Error('練琴時間至少 15 分鐘');
                if (minutes % 15 !== 0) throw new Error('練琴時間必須以 15 分鐘為單位');

                // 驗證時間格式並四舍五入到5分鐘倍數
                if (time) {
                    const [hours, mins] = time.split(':').map(Number);
                    const roundedMins = Math.round(mins / 5) * 5;
                    const finalHours = roundedMins === 60 ? hours + 1 : hours;
                    const finalMins = roundedMins === 60 ? 0 : roundedMins;
                    
                    // 確保小時不超過23
                    if (finalHours > 23) {
                        throw new Error('時間超出範圍');
                    }
                    
                    time = String(finalHours).padStart(2, '0') + ':' + String(finalMins).padStart(2, '0');
                }

                // 🔍 調試：顯示發送的時間
                const dateObj = new Date(date);
                const timeObj = time ? new Date(`2000-01-01T${time}`) : null;
                
                console.log('📤 提交練琴記錄:', {
                    日期輸入: date,
                    時間輸入: time,
                    系統時區偏移: new Date().getTimezoneOffset(),
                    發送的日期: dateObj.toISOString().split('T')[0],
                    發送的時間: time ? `2000-01-01T${time}:00` : null
                });

                const response = await fetch(`${API_BASE_URL}/practice/record`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        // 發送本地日期和時間，不使用 ISO 格式轉換（避免時區問題）
                        date: `${date}T00:00:00`,
                        time: time ? `2000-01-01T${time}:00` : null,
                        practice_minutes: minutes,
                        notes: notes
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || '提交失敗');
                }

                const data = await response.json();
                showSuccess('練琴記錄已提交，等待家長批准！');
                document.getElementById('practiceNotes').value = '';
                document.getElementById('practiceMinutes').value = '15';
                
                // 重新設置預設時間
                const now = new Date();
                const nowMinutes = Math.round(now.getMinutes() / 5) * 5;
                let nowHours = now.getHours();
                let finalMinutes = nowMinutes;
                
                // 處理舍入導致的小時變化
                if (finalMinutes >= 60) {
                    nowHours = (nowHours + 1) % 24;
                    finalMinutes = 0;
                }
                
                const finalTime = String(nowHours).padStart(2, '0') + ':' + String(finalMinutes).padStart(2, '0');
                document.getElementById('practiceTime').value = finalTime;
                
                console.log('⏰ 重置時間:', {
                    新時間: finalTime,
                    系統時間: now.toString()
                });
                
                loadPracticeRecords(currentUserId);
            } catch (error) {
                showError('提交練琴記錄失敗: ' + error.message);
            }
        }

        // 加載練琴紀錄
        async function loadPracticeRecords(childId) {
            try {
                if (!currentToken) return;

                const response = await fetch(`${API_BASE_URL}/practice/records/${childId}`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });

                if (!response.ok) throw new Error('加載失敗');

                const data = await response.json();
                
                // 🔍 調試：記錄收到的數據
                console.log('📊 loadPracticeRecords 收到的數據:', {
                    total_records: data.total_records,
                    pending_records: data.pending_records,
                    approved_records: data.approved_records,
                    records_array_length: data.records ? data.records.length : 0,
                    records_array: data.records
                });
                
                const list = document.getElementById('practiceRecordsList');
                
                if (!data.records || data.records.length === 0) {
                    list.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">暫無練琴紀錄</p>';
                    console.log('✅ 無記錄');
                    return;
                }

                // 🔍 調試：顯示即將渲染的記錄數量
                console.log(`📝 即將顯示 ${data.records.length} 筆記錄`);

                list.innerHTML = `
                    <div style="margin-bottom: 15px; color: #666;">
                        <strong>批准紀錄: ${data.approved_records}</strong> | 
                        <strong>待審核: ${data.pending_records}</strong> | 
                        <strong>已批准總時間: ${data.total_approved_minutes}</strong> 分鐘
                    </div>
                ` + data.records.map((r, index) => {
                    console.log(`  [${index + 1}] 渲染紀錄: ${r.date} - ${r.practice_minutes}分鐘`);
                    return `
                    <div class="record-item">
                        <div class="record-header">
                            <div class="record-date">${r.date}${r.time ? ' ' + r.time.substring(0, 5) : ''}</div>
                            <div class="record-status ${r.status}">${getStatusText(r.status)}</div>
                        </div>
                        <div class="record-details">
                            <div>⏱️ 練琴時間: ${r.practice_minutes} 分鐘</div>
                            <div>📝 備註: ${r.notes || '無'}</div>
                        </div>
                    </div>
                `;
                }).join('');
                
                console.log(`✅ 成功渲染 ${data.records.length} 筆記錄到頁面`);
            } catch (error) {
                console.error('❌ 加載練琴紀錄失敗:', error);
            }
        }

        // 申請遊戲時間
        async function requestGameTime() {
            try {
                if (!currentToken) throw new Error('未登入');

                const minutes = parseInt(document.getElementById('gameMinutes').value);

                if (!minutes || minutes < 15) throw new Error('申請時間至少 15 分鐘');
                if (minutes % 15 !== 0) throw new Error('申請時間必須以 15 分鐘為單位');

                const response = await fetch(`${API_BASE_URL}/awards/request`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        game_minutes: minutes
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || '申請失敗');
                }

                const data = await response.json();
                showSuccess(`申請成功！已扣除 ${data.game_minutes_used} 點，剩餘 ${data.remaining_balance} 點`);
                document.getElementById('gameMinutes').value = '15';
                loadGameBalance(currentUserId);
            } catch (error) {
                showError('申請遊戲時間失敗: ' + error.message);
            }
        }

        // 加載遊戲時間餘額（並同步更新 header 點數）
        async function loadGameBalance(childId) {
            try {
                if (!currentToken) return;
                const response = await fetch(`${API_BASE_URL}/awards/balance/${childId}`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                if (!response.ok) throw new Error('加載失敗');
                const data = await response.json();
                document.getElementById('headerBalanceValue').textContent = data.game_balance;
            } catch (error) {
                console.error('加載遊戲時間餘額失敗:', error);
            }
        }

        // 加載兌換比例說明
        async function loadRatioInfo() {
            try {
                if (!currentToken) return;
                const response = await fetch(`${API_BASE_URL}/awards/ratio`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                if (!response.ok) return;
                const data = await response.json();
                document.getElementById('ratioInfo').textContent = data.description;
            } catch (error) {
                console.error('加載兌換比例失敗:', error);
            }
        }

        // 加載獎勵兌換紀錄
        async function loadRewardHistory(childId) {
            const list = document.getElementById('rewardHistoryList');
            list.innerHTML = '<p style="text-align:center;color:var(--text-subdued);">載入中...</p>';
            try {
                if (!currentToken) return;
                const response = await fetch(`${API_BASE_URL}/awards/request-history/${childId}`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                if (!response.ok) throw new Error('加載失敗');
                const data = await response.json();

                if (!data.requests || data.requests.length === 0) {
                    list.innerHTML = '<p style="color:var(--text-subdued);text-align:center;padding:20px;">尚無兌換紀錄</p>';
                    return;
                }

                list.innerHTML = data.requests.map(r => `
                    <div class="record-item">
                        <div class="record-header">
                            <div>
                                <div class="record-date">🎮 兌換遊戲時間</div>
                                <div style="font-size:12px;color:var(--text-subdued);margin-top:3px;">
                                    ${new Date(r.request_date).toLocaleString('zh-TW')}
                                </div>
                            </div>
                            <div class="reward-cost-badge">− ${r.game_minutes} 點</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                list.innerHTML = `<p style="color:var(--danger)">載入失敗：${error.message}</p>`;
            }
        }

        // 狀態文字
        function getStatusText(status) {
            const statusMap = {
                'pending': '⏳ 待審核',
                'approved': '✅ 已批准',
                'rejected': '❌ 已拒絕'
            };
            return statusMap[status] || status;
        }

        // 登出
        function handleLogout() {
            currentToken = null;
            currentUserId = null;
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('parentUsername').value = 'parent2024';
            document.getElementById('parentPassword').value = 'securepass123';
            document.getElementById('childId').value = '1';
            document.getElementById('childPassword').value = 'child123';
            selectUserType('parent');
            clearMessages();
            showSuccess('已登出');
        }


    </script>
